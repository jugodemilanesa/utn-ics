# Configuracion de SonarCloud para el analisis CI-based.
# IMPORTANTE: confirmar organization y projectKey contra lo que muestra la UI de
# SonarCloud al crear el proyecto; si difieren, ajustar estas dos lineas.

sonar.organization=jugodemilanesa
sonar.projectKey=jugodemilanesa_utn-ics
sonar.projectName=utn-ics

# El host por defecto ya es https://sonarcloud.io, no hace falta declararlo.

# --- Que analizar ---
# Tomamos todo el codigo como fuente...
sonar.sources=.
# ...pero los archivos *_test.go los tratamos como tests, no como codigo de produccion.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
# Excluimos los tests del set de "sources" (para no contarlos doble) y los assets web.
sonar.exclusions=**/*_test.go,web/**

# --- Cobertura de Go ---
# Sonar lee el reporte que genera: go test -coverprofile=coverage.out ./...
sonar.go.coverage.reportPaths=coverage.out

# Codificacion del codigo fuente.
sonar.sourceEncoding=UTF-8
