# Pipeline de CI para utn-ics en Semaphore.
# Trigger: push Y pull request (ambos habilitados en Settings del proyecto). Para
# NO duplicar trabajo, cada block se gatea con run/when segun el tipo de build:
#   - push a master         -> corre todo (Validate + Sonar modo main) + deploy
#   - push a rama feature   -> los blocks se SKIPEAN (no hay contexto de PR)
#   - build de Pull Request -> Validate + Sonar en modo PR (numero de PR nativo)
# El deploy NO esta aca: se dispara por promotion (al final) hacia deploy.yml, y
# SOLO en push real a master (jamas desde un build de PR; ver el guard del when).
version: v1.0
name: CI utn-ics

agent:
  machine:
    # Esta org solo ofrece F1 (x86_64) y R1 (ARM). Usamos F1: el block Sonar hace
    # 'docker run' y ARM cambiaria la arquitectura de las imagenes. os_image valido
    # para F1: ubuntu2204 o ubuntu2404.
    type: f1-standard-2
    os_image: ubuntu2204

# Si un job falla, no tiene sentido seguir gastando VMs en el resto: cortamos todo.
fail_fast:
  stop:
    when: "true"

# Un push nuevo cancela el build viejo de esa misma rama que siga en cola/corriendo
# (en master NO: dejamos terminar para no abortar un deploy a mitad de camino).
auto_cancel:
  running:
    when: "branch != 'master'"

blocks:
  # ---- Block 1: validacion (formato, vet, build, tests con cobertura) ----
  - name: Validate
    # Corre UNA sola vez por cambio, SIEMPRE que sea build de PUSH (cualquier rama
    # + master), nunca en build de PR. 'pull_request !~' = "no es un build de PR".
    #   - push a rama sin PR -> corre (tenes tests sin abrir PR)
    #   - push a rama con PR -> corre en el pipeline de PUSH; el de PR lo skipea
    #   - push a master      -> corre
    # El no-duplicar sale de esto: un push a una rama con PR dispara DOS pipelines
    # (push + pr); Validate va SOLO en el de push y Sonar SOLO en el de PR.
    run:
      when: "pull_request !~ '.*'"
    dependencies: []
    task:
      jobs:
        - name: gofmt vet build test
          commands:
            - checkout
            - sem-version go 1.22       # alinea la toolchain con go.mod
            # gofmt -l lista archivos mal formateados; test -z falla si hay alguno.
            - test -z "$(gofmt -l .)"
            - go vet ./...
            - go build ./...
            - go test -coverprofile=coverage.out ./...

  # ---- Block 2: analisis de calidad con SonarCloud ----
  # Cada block corre en su propia VM, asi que NO hereda el coverage.out del block
  # Validate: lo regeneramos aca para que el scanner lo lea (es barato en este repo).
  - name: Sonar
    # Corre SOLO en build de PR (modo PR) o push a master (modo main). En un push a
    # rama feature (con o sin PR) queda SKIPPED -> nunca corre en modo branch (que
    # daria 403 del free tier). Asi Sonar tambien corre una sola vez por cambio.
    # Sin 'dependencies': Validate ahora vive en OTRO pipeline (el de push), y las
    # dependencias son intra-pipeline. En master corren juntos; si Validate falla,
    # fail_fast corta y de ultima la promotion exige result=passed (no deploya roto).
    run:
      when: "branch = 'master' OR pull_request =~ '.*'"
    dependencies: []
    task:
      secrets:
        # Secret de Semaphore llamado 'sonarcloud' que contiene SONAR_TOKEN.
        - name: sonarcloud
      env_vars:
        - name: SONAR_HOST_URL
          value: https://sonarcloud.io
      jobs:
        - name: SonarCloud analysis
          commands:
            - checkout
            - |
              # Modo segun el tipo de build. Ya NO consultamos la API de GitHub: en un
              # build de PR, Semaphore expone el numero de PR de forma nativa (este es
              # el motivo por el que el plan eligio Semaphore).
              if [ -n "$SEMAPHORE_GIT_PR_NUMBER" ]; then
                # PR_BRANCH = rama origen del PR; GIT_BRANCH = rama destino (master).
                PR_ARGS="-Dsonar.pullrequest.key=$SEMAPHORE_GIT_PR_NUMBER -Dsonar.pullrequest.branch=$SEMAPHORE_GIT_PR_BRANCH -Dsonar.pullrequest.base=$SEMAPHORE_GIT_BRANCH"
              else
                PR_ARGS=""   # push a master -> modo main
              fi
              sem-version go 1.22
              go test -coverprofile=coverage.out ./...
              docker run --rm \
                -e SONAR_TOKEN \
                -e SONAR_HOST_URL \
                -v "$(pwd):/usr/src" \
                sonarsource/sonar-scanner-cli \
                $PR_ARGS

# ---- Deploy por promotion (SOLO push real a master, jamas desde un build de PR) ----
# OJO: en un build de PR, SEMAPHORE_GIT_BRANCH = master (la rama DESTINO), asi que
# 'branch = master' por si solo NO alcanza: dispararia un deploy del codigo del PR
# sin mergear. Por eso sumamos 'pull_request !~' para excluir builds de PR. Doble
# red: deploy.yml ademas tiene un guard por env var en runtime.
promotions:
  - name: Deploy a Render
    pipeline_file: deploy.yml
    auto_promote:
      when: "result = 'passed' AND branch = 'master' AND pull_request !~ '.*'"
