# Pipeline de CI para utn-ics en Semaphore.
# Corre en cada PUSH (el trigger de Pull Requests esta apagado a proposito: evita el
# doble build push+pr). Dos blocks: Validate (siempre) y Sonar (decide su modo solo).
# El deploy NO esta aca: se dispara por promotion (ver el final) hacia deploy.yml,
# solo cuando el pipeline pasa en master.
version: v1.0
name: CI utn-ics

agent:
  machine:
    # Esta org solo ofrece F1 (x86_64) y R1 (ARM). Usamos F1: el block Sonar hace
    # 'docker run' y ARM cambiaria la arquitectura de las imagenes. os_image valido
    # para F1: ubuntu2204 o ubuntu2404.
    type: f1-standard-2
    os_image: ubuntu2204

blocks:
  # ---- Block 1: validacion (formato, vet, build, tests con cobertura) ----
  - name: Validate
    task:
      jobs:
        - name: gofmt vet build test
          commands:
            - checkout
            - sem-version go 1.22       # alinea la toolchain con go.mod
            # gofmt -l lista archivos mal formateados; test -z falla si hay alguno.
            - test -z "$(gofmt -l .)"
            - go vet ./...
            - go build ./...
            - go test -coverprofile=coverage.out ./...

  # ---- Block 2: analisis de calidad con SonarCloud ----
  # Cada block corre en su propia VM, asi que NO hereda el coverage.out del block
  # Validate: lo regeneramos aca para que el scanner lo lea (es barato en este repo).
  - name: Sonar
    # Sin 'run: when': el block corre en todo push y decide su modo adentro. Como no
    # hay trigger de PR, el numero de PR se resuelve via la API de GitHub (repo publico,
    # sin token). Modos:
    #   - master                -> modo main.
    #   - feature branch con PR  -> modo PR (la API devuelve el numero).
    #   - feature branch sin PR  -> se omite (exit 0): sin contexto registraria como main.
    # El plan Free de SonarCloud permite modo PR si el target es la main branch.
    task:
      secrets:
        # Secret de Semaphore llamado 'sonarcloud' que contiene SONAR_TOKEN.
        - name: sonarcloud
      env_vars:
        - name: SONAR_HOST_URL
          value: https://sonarcloud.io
      jobs:
        - name: SonarCloud analysis
          commands:
            - checkout
            # Decidir el modo ANTES de gastar en tests/scanner.
            - |
              # Guard: si quedara prendido el trigger de PR, Sonar igual corre desde el
              # build de push; el build de PR se omite (evita pisar master y duplicados).
              if [ "$SEMAPHORE_GIT_REF_TYPE" = "pull-request" ]; then
                echo "Build de tipo PR: en este proyecto Sonar corre desde el push. Se omite."
                exit 0
              fi
              if [ "$SEMAPHORE_GIT_BRANCH" = "master" ]; then
                PR_ARGS=""   # modo main
              else
                PR=$(curl -s "https://api.github.com/repos/jugodemilanesa/utn-ics/pulls?head=jugodemilanesa:$SEMAPHORE_GIT_BRANCH&state=open" | jq -r '.[0].number // empty')
                if [ -z "$PR" ]; then
                  echo "Sin PR abierto para $SEMAPHORE_GIT_BRANCH; se omite Sonar."
                  exit 0
                fi
                PR_ARGS="-Dsonar.pullrequest.key=$PR -Dsonar.pullrequest.branch=$SEMAPHORE_GIT_BRANCH -Dsonar.pullrequest.base=master"
              fi
              sem-version go 1.22
              go test -coverprofile=coverage.out ./...
              docker run --rm \
                -e SONAR_TOKEN \
                -e SONAR_HOST_URL \
                -v "$(pwd):/usr/src" \
                sonarsource/sonar-scanner-cli \
                $PR_ARGS

# ---- Deploy por promotion (solo en master, si todo paso) ----
# Si Validate o Sonar fallan, result != passed y la promotion no dispara: no hay deploy.
promotions:
  - name: Deploy a Render
    pipeline_file: deploy.yml
    auto_promote:
      when: "branch = 'master' AND result = 'passed'"
