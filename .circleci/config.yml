# Pipeline de CircleCI para utn-ics.
# Version del formato de config (2.1 es la actual; habilita workflows, etc.).
version: 2.1

jobs:
  # ---- Job 1: validacion (formato, vet, build, tests con cobertura) ----
  validar:
    docker:
      - image: cimg/go:1.22 # toolchain de Go 1.22 (coincide con go.mod)
    steps:
      - checkout
      - run:
          name: Formato (gofmt)
          # Si gofmt -l lista algun archivo, "test -z" falla => job rojo.
          command: test -z "$(gofmt -l .)"
      - run:
          name: Vet (analisis estatico basico)
          command: go vet ./...
      - run:
          name: Build (chequea compilacion)
          command: go build ./...
      - run:
          name: Tests con cobertura
          # -coverprofile genera coverage.out, que despues lee SonarCloud.
          command: go test -coverprofile=coverage.out ./...
      # Guardamos TODO el directorio (codigo + coverage.out + sonar-project.properties)
      # en un workspace, para que el job 'sonar' (otro contenedor) lo pueda usar.
      - persist_to_workspace:
          root: .
          paths:
            - .

  # ---- Job 2: analisis de calidad con SonarCloud ----
  sonar:
    # Imagen oficial del scanner: ya trae Java + el sonar-scanner listo.
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    environment:
      # Sin esto, el scanner apunta a localhost:9000 por defecto.
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      # Recuperamos lo que guardo 'validar' (incluye coverage.out y las properties).
      - attach_workspace:
          at: .
      - run:
          name: Analisis SonarCloud
          # Lee sonar-project.properties; SONAR_TOKEN viene del Context 'sonarcloud'.
          command: sonar-scanner

workflows:
  ci:
    jobs:
      - validar
      - sonar:
          requires:
            - validar # sonar corre despues de que validar termine OK
          context: sonarcloud # inyecta SONAR_TOKEN desde el Context
